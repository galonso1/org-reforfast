  </style>
</head>

function getStoredSession(){
  try { return JSON.parse(localStorage.getItem(AUTH_STORAGE_KEY)||'null'); } catch(e){ return null; }
}
function setStoredSession(session){
  if(session) localStorage.setItem(AUTH_STORAGE_KEY, JSON.stringify(session));
  else localStorage.removeItem(AUTH_STORAGE_KEY);
}
function authHeaders(token, extra={}){
  return Object.assign({ 'apikey': SUPABASE_KEY, 'Content-Type': 'application/json' }, token ? { 'Authorization': `Bearer ${token}` } : {}, extra);
}
async function signInWithSupabase(email, password){
  const res = await fetch(`${SUPABASE_URL}/auth/v1/token?grant_type=password`, {
    method:'POST', headers: authHeaders(null), body: JSON.stringify({ email, password })
  });
  const json = await res.json().catch(()=>({}));
  if(!res.ok) throw new Error(json.error_description || json.msg || json.error || 'No se ha podido iniciar sesión.');
  const session = { access_token: json.access_token, refresh_token: json.refresh_token, user: json.user || null, expires_at: json.expires_at || null };
  setStoredSession(session);
  return session;
}
async function signOutFromSupabase(){
  const session = getStoredSession();
  try{
    if(session && session.access_token){
      await fetch(`${SUPABASE_URL}/auth/v1/logout`, { method:'POST', headers: authHeaders(session.access_token) });
    }
  }catch(e){}

}

  const res = await fetch(`${SUPABASE_URL}/rest/v1/profiles?id=eq.${encodeURIComponent(userId)}&select=id,email,full_name,role`, {

const pad=n=>String(n).padStart(2,'0');
const parseISO=(iso)=>{const [y,m,d]=iso.split('-').map(Number);return new Date(Date.UTC(y,m-1,d));};
const toISO=(date)=>`${date.getUTCFullYear()}-${pad(date.getUTCMonth()+1)}-${pad(date.getUTCDate())}`;
const todayISO=()=>toISO(new Date());
const addDays=(iso, days)=>{const d=parseISO(iso); d.setUTCDate(d.getUTCDate()+days); return toISO(d);};

const isSundayISO=(iso)=>parseISO(iso).getUTCDay()===0;
function getNonWorkingDaySet(){
  return new Set((db.nonWorkingDays||[]).map(x=>x.date));
}
function isNonWorkingDate(iso, blockedSet=getNonWorkingDaySet()){
  return isSundayISO(iso) || blockedSet.has(iso);
}
function nextWorkingDate(iso, blockedSet=getNonWorkingDaySet()){
  if(!iso) return iso;
  let current=iso;
  let guard=0;
  while(isNonWorkingDate(current, blockedSet) && guard<370){
    current=addDays(current,1);
    guard++;
  }
  return current;
}
function addWorkingDays(startIso, durationDays, blockedSet=getNonWorkingDaySet()){
  let current=nextWorkingDate(startIso, blockedSet);
  let remaining=Math.max(1, Number(durationDays)||1)-1;
  let guard=0;
  while(remaining>0 && guard<5000){
    current=addDays(current,1);
    current=nextWorkingDate(current, blockedSet);
    remaining--;
    guard++;
  }
  return current;
}
function nextWorkdayAfter(iso, blockedSet=getNonWorkingDaySet()){
  return nextWorkingDate(addDays(iso,1), blockedSet);
}

function loadLocal(){ try{ return Object.assign(clone(defaultData), JSON.parse(localStorage.getItem(LS_KEY)||'{}')); }catch(e){ return clone(defaultData);} }
function normalizeDb(data){ return Object.assign(clone(defaultData), data||{}); }
async function loadFromSupabase(){
  const session = getStoredSession();
  if(!session || !session.access_token) return false;
  try{
    const data = await readAppData(session.access_token);
    if(data && data.data){
      db = normalizeDb(data.data);
      localStorage.setItem(LS_KEY, JSON.stringify(db));
      return true;
    }
    const local = loadLocal();
    db = normalizeDb(local);
    await upsertAppData(session.access_token, db);
    localStorage.setItem(LS_KEY, JSON.stringify(db));
    return true;
  }catch(err){
    console.warn('No se pudieron cargar los datos desde Supabase', err);
    const local = loadLocal();
    db = normalizeDb(local);
    return false;
  }
}
async function save(){
  localStorage.setItem(LS_KEY, JSON.stringify(db));
  const session = getStoredSession();
  if(!session || !session.access_token) return false;
  try{
    await upsertAppData(session.access_token, db);
    localStorage.setItem('LAST_REMOTE_SYNC', new Date().toISOString());
    return true;
  }catch(err){
    console.warn('No se pudieron guardar los datos en Supabase', err);
    return false;
  }
}

function templatesForType(name){ return db.stageTemplates.filter(x=>x.workTypeName===name).sort((a,b)=>a.order-b.order); }
function projectTasks(project){ return templatesForType(project.workTypeName).map(t=>({
    projectId:project.id, projectName:project.name, workTypeName:project.workTypeName, priority:project.priority,
    startBase:project.startDate, stageOrder:t.order, stage:t.stage, speciality:t.speciality,
    durationDays:Number(t.durationDays)||1, crewSize:Number(t.crewSize)||1,
    taskId:project.id+'__'+t.order
  })); }

function getStageTemplate(projectId, stageOrder){
  const project=db.projects.find(p=>p.id===projectId);
  if(!project) return null;
  return templatesForType(project.workTypeName).find(t=>Number(t.order)===Number(stageOrder)) || null;
}
function getManualOverrideForTask(task){
  const list=(db.manualOverrides||[]).filter(o=>o.projectId===task.projectId && Number(o.stageOrder)===Number(task.stageOrder));
  if(!list.length) return null;
  list.sort((a,b)=>(a.startDate||'').localeCompare(b.startDate||''));
  return list[0];
}
function computePlan(){
  const employees=db.employees.filter(e=>e.active);
  const employeeMap=Object.fromEntries(employees.map(e=>[e.id,e]));
  const absByEmp={};
  db.absences.forEach(a=>{ if(!absByEmp[a.employeeId]) absByEmp[a.employeeId]=[]; absByEmp[a.employeeId].push(a); });
  const blockedSet=getNonWorkingDaySet();
  const nextFree={}; employees.forEach(e=>nextFree[e.id]=nextWorkingDate(todayISO(), blockedSet));
  const plan=[];
  const projects=clone(db.projects).filter(p=>p.status!=='Terminada').sort((a,b)=> (a.priority-b.priority) || a.startDate.localeCompare(b.startDate));
  for(const p of projects){
    let prevEnd=nextWorkingDate(p.startDate, blockedSet);
    for(const task of projectTasks(p)){
      const manual=getManualOverrideForTask(task);
      if(manual){
        const emp=employeeMap[manual.employeeId];
        const employeeName=emp ? emp.name : 'EMPLEADO NO DISPONIBLE';
        const startDate=manual.startDate||prevEnd;
        const endDate=manual.endDate||startDate;
        if(emp){
          nextFree[emp.id]=nextWorkdayAfter(endDate, blockedSet);
        }
        plan.push({...task, employeeId:manual.employeeId||'', employeeIds:manual.employeeId?[manual.employeeId]:[], employeeName, startDate, endDate, status:'Manual', isManual:true, manualId:manual.id, manualNote:manual.note||''});
        prevEnd=nextWorkdayAfter(endDate, blockedSet);
        continue;
      }
      const eligible=employees.filter(e=>e.specialities.includes(task.speciality));
      if(!eligible.length){
        plan.push({...task, employeeId:'', employeeIds:[], employeeName:'SIN EMPLEADO', startDate:'', endDate:'', status:'Sin recurso', isManual:false});
        continue;
      }
      const assigned=[];
      for(const e of eligible){
        let candidate = nextFree[e.id] > prevEnd ? nextFree[e.id] : prevEnd;
        candidate = nextWorkingDate(candidate, blockedSet);
        const abs = absByEmp[e.id] || [];
        let moved=true;
        let guard=0;
        while(moved && guard<500){
          moved=false;
          if(isNonWorkingDate(candidate, blockedSet)){
            candidate=nextWorkingDate(candidate, blockedSet);
            moved=true;
          }
          for(const a of abs){
            if(candidate>=a.startDate && candidate<=a.endDate){
              candidate=nextWorkingDate(addDays(a.endDate,1), blockedSet);
              moved=true;
            }
          }
          guard++;
        }
        assigned.push({emp:e, startDate:candidate, score:[candidate, p.priority, e.name]});
      }
      assigned.sort((a,b)=> a.score.join('|').localeCompare(b.score.join('|')));
      const selected=assigned.slice(0, Math.max(1, Number(task.crewSize)||1));
      if(!selected.length){
        plan.push({...task, employeeId:'', employeeIds:[], employeeName:'SIN EMPLEADO', startDate:'', endDate:'', status:'Sin recurso', isManual:false});
        continue;
      }
      const startDate=selected.reduce((max,a)=> a.startDate>max?a.startDate:max, prevEnd);
      const endDate=addWorkingDays(startDate, task.durationDays, blockedSet);
      selected.forEach(a=>{ nextFree[a.emp.id]=nextWorkdayAfter(endDate, blockedSet); });
      const employeeIds=selected.map(a=>a.emp.id);
      const employeeName=selected.map(a=>a.emp.name).join(', ');
      plan.push({...task, employeeId:employeeIds[0]||'', employeeIds, employeeName, startDate, endDate, status:selected.length < Math.max(1, Number(task.crewSize)||1)?'Planificada parcial':'Planificada', isManual:false});
      prevEnd=nextWorkdayAfter(endDate, blockedSet);
    }
  }
  return plan;
}

function kpis(plan){
  const activeProjects=db.projects.filter(p=>p.status!=='Terminada').length;
  const unassigned=plan.filter(x=>!x.employeeId).length;
  const byEmp={}; plan.forEach(p=>{ if(p.employeeName && p.employeeId){ byEmp[p.employeeName]=(byEmp[p.employeeName]||0)+p.durationDays; } });
  return {activeProjects,unassigned,plannedTasks:plan.length, busiest:Object.entries(byEmp).sort((a,b)=>b[1]-a[1])[0]};
}

function saveManualOverrideModal(id=''){

  const startDate=document.getElementById('m_mo_start').value;

  if(!projectId || !stageOrder || !employeeId || !startDate || !endDate){ alert('Rellena obra, etapa, empleado y fechas.'); return; }
  if(endDate < startDate){ alert('La fecha fin no puede ser anterior a la fecha inicio.'); return; }
  db.manualOverrides = db.manualOverrides || [];
  const payload={id:id||uid('mo'), projectId, stageOrder, employeeId, startDate, endDate, note};
  const duplicated=db.manualOverrides.some(x=>x.id!==payload.id && x.projectId===projectId && Number(x.stageOrder)===stageOrder);
  if(duplicated){ alert('Ya existe una asignación manual para esa etapa. Edita la existente o bórrala primero.'); return; }
  if(id){
    const idx=db.manualOverrides.findIndex(x=>x.id===id);

function monthRange(monthValue){
  const [y,m]=monthValue.split('-').map(Number);
  const first=`${y}-${pad(m)}-01`;
  const d=new Date(Date.UTC(y,m,0));
  return {start:first,end:`${y}-${pad(m)}-${pad(d.getUTCDate())}`,year:y,month:m};
}
function datesBetween(startIso,endIso){
  if(!startIso||!endIso) return [];
  const out=[];
  let current=startIso;
  let guard=0;
  while(current<=endIso && guard<5000){ out.push(current); current=addDays(current,1); guard++; }
  return out;
}
function getTaskCalendarDates(task, blockedSet=getNonWorkingDaySet()){
  if(!task.startDate||!task.endDate) return [];
  if(task.isManual) return datesBetween(task.startDate, task.endDate);
  const out=[];
  let current=nextWorkingDate(task.startDate, blockedSet);
  let remaining=Math.max(1, Number(task.durationDays)||1);
  let guard=0;
  while(remaining>0 && guard<5000){
    out.push(current);
    current=nextWorkdayAfter(current, blockedSet);
    remaining--; guard++;
  }
  return out;
}
function overlapsMonth(task, startIso, endIso){
  return task.startDate && task.endDate && !(task.endDate < startIso || task.startDate > endIso);
}
function monthLabel(monthValue){
  const [y,m]=monthValue.split('-').map(Number);
  return new Date(Date.UTC(y,m-1,1)).toLocaleDateString('es-ES',{month:'long',year:'numeric',timeZone:'UTC'});
}
function shiftCalendarMonth(delta){
  const [y,m]=calendarState.month.split('-').map(Number);
  const d=new Date(Date.UTC(y,m-1+delta,1));
  calendarState.month=`${d.getUTCFullYear()}-${pad(d.getUTCMonth()+1)}`;
  render();
}
function setCalendarMonth(value){
  if(value) calendarState.month=value;
  render();
}
function setCalendarView(value){
  calendarState.view=value||'works';
  render();
}
function buildCalendarRows(plan, monthStart, monthEnd, blockedSet){
  if(calendarState.view==='employees'){
    const map={};
    db.employees.filter(e=>e.active).forEach(e=>map[e.id]={label:e.name, sub:e.specialities.join(', '), cells:{}});
    plan.filter(t=>overlapsMonth(t,monthStart,monthEnd)).forEach(task=>{
      const ids=(task.employeeIds && task.employeeIds.length)?task.employeeIds:(task.employeeId?[task.employeeId]:[]);
      if(!ids.length) return;
      const dates=getTaskCalendarDates(task, blockedSet).filter(d=>d>=monthStart&&d<=monthEnd);
      ids.forEach(empId=>{
        const emp=db.employees.find(e=>e.id===empId);
        if(!map[empId]) map[empId]={label:(emp&&emp.name)||'Empleado',sub:(emp&&emp.specialities.join(', '))||'',cells:{}};
        dates.forEach(date=>{
          map[empId].cells[date]={
            type:task.isManual?'manual':'auto',
            text:`${task.projectName} · ${task.stage}`,
            title:`${task.projectName} · ${task.stage} (${(emp&&emp.name)||task.employeeName||'-'})`,
            clickable:true,
            projectName:task.projectName,
            stage:task.stage,
            employeeName:(emp&&emp.name)||'',
            startDate:task.startDate||'',
            endDate:task.endDate||'',
            mode:task.isManual?'Manual':'Automática'
          };
        });
      });
    });
    return Object.values(map).map(r=>({primary:r.label, secondary:r.sub||'—', tertiary:'', cells:r.cells})).filter(r=>Object.keys(r.cells).length);
  }
  return plan.filter(t=>overlapsMonth(t,monthStart,monthEnd)).map(task=>{
    const cells={};
    const dates=getTaskCalendarDates(task, blockedSet).filter(d=>d>=monthStart&&d<=monthEnd);
    const hasEmployees=(task.employeeIds && task.employeeIds.length) || task.employeeId;
    dates.forEach(date=>{cells[date]={type:hasEmployees?(task.isManual?'manual':'auto'):'empty',text:'',title:`${task.projectName} · ${task.stage} · ${task.employeeName||'Sin empleado'}`};});
    return {
      primary:task.projectName,
      secondary:`${task.stageOrder}. ${task.stage}`,
      tertiary:task.employeeName||'Sin empleado',
      cells
    };
  });
}
function renderCalendarTable(rows, monthValue, blockedSet){
  const {start,end}=monthRange(monthValue);
  const days=datesBetween(start,end);
  const today=todayISO();
  const header=days.map(d=>`<th class="day-head ${isSundayISO(d)?'weekend':''} ${blockedSet.has(d)?'blocked':''} ${d===today?'today':''}"><span class="num">${Number(d.slice(8,10))}</span>${['D','L','M','X','J','V','S'][parseISO(d).getUTCDay()]}</th>`).join('');
  const body=rows.map(r=>`<tr>
      <td class="sticky-col"><strong>${esc(r.primary)}</strong></td>
      <td class="sticky-col second">${esc(r.secondary||'')}</td>
      <td class="sticky-col third">${esc(r.tertiary||'')}</td>
      ${days.map(d=>{ const cell=r.cells[d]; const classes=['day']; if(isSundayISO(d)) classes.push('weekend'); if(blockedSet.has(d)) classes.push('blocked'); if(d===today) classes.push('today'); return `<td class="${classes.join(' ')}">${cell?`<span class="bar ${cell.type}${cell.clickable?' clickable':''}" title="${esc(cell.title||'')}" ${cell.clickable?`onclick="openCalendarEventModal('${esc(cell.projectName||'')}','${esc(cell.stage||'')}','${esc(cell.employeeName||'')}','${esc(cell.startDate||'')}','${esc(cell.endDate||'')}','${esc(cell.mode||'')}')"`:''}></span>`:''}</td>`; }).join('')}
    </tr>`).join('');
  const thirdLabel=calendarState.view==='employees'?'':'Empleado';
  return `<div class="calendar-shell"><div class="calendar-scroll"><table class="calendar-grid"><thead><tr><th class="sticky-col">${calendarState.view==='employees'?'Empleado':'Obra'}</th><th class="sticky-col second">${calendarState.view==='employees'?'Especialidades':'Etapa'}</th><th class="sticky-col third">${thirdLabel}</th>${header}</tr></thead><tbody>${body || `<tr><td class="sticky-col">Sin datos</td><td class="sticky-col second"></td><td class="sticky-col third"></td>${days.map(d=>`<td class="day ${isSundayISO(d)?'weekend':''} ${blockedSet.has(d)?'blocked':''}"></td>`).join('')}</tr>`}</tbody></table></div></div>`;
}

      <div class="calendar-legend" style="margin-bottom:12px">
        <span class="pill"><span class="dot auto"></span>Automática</span>
        <span class="pill"><span class="dot manual"></span>Manual</span>

        <span class="pill"><span class="dot blocked"></span>Día no laborable</span>
      </div>
      ${renderCalendarTable(rows, monthValue, blockedSet)}
      <div class="calendar-meta">

        <div class="mini-stat"><span class="muted">Tareas visibles</span><strong>${visibleTasks.length}</strong></div>
        <div class="mini-stat"><span class="muted">Automáticas</span><strong>${autoCount}</strong></div>
        <div class="mini-stat"><span class="muted">Manuales</span><strong>${manualCount}</strong></div>
        <div class="mini-stat"><span class="muted">Sin recurso</span><strong>${emptyCount}</strong></div>
      </div>
    </div>
  </div>`;
}

  if(duplicate){ alert('Ese tipo ya existe.'); return; }
  if(id){
    const wt=db.workTypes.find(x=>x.id===id);

    <label>Duración (días)</label><input id="m_st_days" type="number" value="${current.durationDays||1}" min="1">
    <label>Personas necesarias</label><input id="m_st_crew" type="number" value="${current.crewSize||1}" min="1">
  `, ()=>saveStageTemplateModal(id), id ? 'Guardar cambios' : 'Guardar etapa', id?{showCancel:false}:{});
}
function saveStageTemplateModal(id=''){
  const workTypeName=document.getElementById('m_st_type').value;
  const order=Number(document.getElementById('m_st_order').value||1);
  const stage=document.getElementById('m_st_stage').value.trim();
  const speciality=document.getElementById('m_st_spec').value.trim();
  const durationDays=Number(document.getElementById('m_st_days').value||1);
  const crewSize=Number(document.getElementById('m_st_crew').value||1);
  if(!stage||!speciality){ alert('Rellena etapa y especialidad.'); return; }
  if(!db.specialities.includes(speciality)) db.specialities.push(speciality);
  if(id){
    const st=db.stageTemplates.find(x=>x.id===id);
    Object.assign(st,{workTypeName,order,stage,speciality,durationDays,crewSize});
  }else{
    db.stageTemplates.push({id:uid('st'),workTypeName,order,stage,speciality,durationDays,crewSize});
  }
  save(); closeModal(); render();
}
function addStageTemplate(){ openStageTemplateModal(); }
function openProjectModal(id=''){
  const p=id ? db.projects.find(x=>x.id===id) : {name:'',client:'',workTypeName:(db.workTypes[0]&&db.workTypes[0].name)||'',startDate:todayISO(),priority:2,status:'Activa',notes:''};
  openModal(id ? 'Editar obra' : 'Nueva obra', `
    <label>Nombre</label><input id="m_pr_name" value="${esc(p.name||'')}">
    <label>Cliente</label><input id="m_pr_client" value="${esc(p.client||'')}">
    <label>Tipo de obra</label><select id="m_pr_type">${db.workTypes.map(w=>`<option ${w.name===p.workTypeName?'selected':''}>${w.name}</option>`).join('')}</select>
    <label>Fecha prevista de inicio</label><input id="m_pr_start" type="date" value="${p.startDate||todayISO()}">
    <label>Prioridad (1 = más urgente)</label><input id="m_pr_priority" type="number" value="${p.priority||2}" min="1" max="9">
    <label>Estado</label><select id="m_pr_status">${['Activa','Pausada','Terminada'].map(s=>`<option ${s===p.status?'selected':''}>${s}</option>`).join('')}</select>
    <label>Notas</label><textarea id="m_pr_notes">${esc(p.notes||'')}</textarea>
  `, ()=>saveProjectModal(id), id ? 'Guardar cambios' : 'Guardar obra', id?{showCancel:false}:{});
}
function saveProjectModal(id=''){
  const name=document.getElementById('m_pr_name').value.trim();
  const client=document.getElementById('m_pr_client').value.trim();
  const workTypeName=document.getElementById('m_pr_type').value;
  const startDate=document.getElementById('m_pr_start').value;
  const priority=Number(document.getElementById('m_pr_priority').value||2);
  const status=document.getElementById('m_pr_status').value;
  const notes=document.getElementById('m_pr_notes').value.trim();
  if(!name){ alert('Pon un nombre a la obra.'); return; }
  if(id){
    const p=db.projects.find(x=>x.id===id);
    Object.assign(p,{name,client,workTypeName,startDate,priority,status,notes});
  }else{
    db.projects.push({id:uid('pr'),name,client,workTypeName,startDate,priority,status,notes});
  }
  save(); closeModal(); render();
}
function addProject(){ openProjectModal(); }
function editProject(id){ openProjectModal(id); }
function openAbsenceModal(id=''){
  const current=id ? db.absences.find(x=>x.id===id) : null;
  openModal(current?'Editar ausencia':'Nueva ausencia', `
    <label>Empleado</label><select id="m_ab_emp">${db.employees.map(e=>`<option value="${e.id}" ${(current&&current.employeeId===e.id)?'selected':''}>${e.name}</option>`).join('')}</select>
    <label>Desde</label><input id="m_ab_start" type="date" value="${current?current.startDate:todayISO()}">
    <label>Hasta</label><input id="m_ab_end" type="date" value="${current?current.endDate:todayISO()}">
    <label>Motivo</label><input id="m_ab_reason" value="${esc(current?current.reason||'':'')}">
  `, ()=>saveAbsenceModal(id), current?'Guardar cambios':'Guardar ausencia', current?{showCancel:false}:{});
}
function saveAbsenceModal(id=''){
  const employeeId=document.getElementById('m_ab_emp').value;
  const startDate=document.getElementById('m_ab_start').value;
  const endDate=document.getElementById('m_ab_end').value;
  const reason=document.getElementById('m_ab_reason').value.trim();
  if(!employeeId||!startDate||!endDate){ alert('Rellena empleado y fechas.'); return; }
  if(endDate < startDate){ alert('La fecha fin no puede ser anterior a la fecha inicio.'); return; }
  const payload={id:id||uid('ab'),employeeId,startDate,endDate,reason};
  if(id){
    const idx=db.absences.findIndex(x=>x.id===id);
    if(idx>=0) db.absences[idx]=payload;
  }else{
    db.absences.push(payload);
  }
  save(); closeModal(); render();
}

function openNonWorkingDayModal(id=''){
  const item=id ? (db.nonWorkingDays||[]).find(x=>x.id===id) : null;
  openModal(item?'Editar día no laborable':'Nuevo día no laborable', `
    <label>Fecha</label><input id="m_nwd_date" type="date" value="${item?item.date:todayISO()}">
    <label>Motivo</label><input id="m_nwd_reason" value="${esc(item?item.reason||'':'')}" placeholder="Festivo local, puente, cierre excepcional...">
  `, ()=>saveNonWorkingDayModal(id), item?'Guardar cambios':'Guardar fecha', item?{showCancel:false}:{});
}
function saveNonWorkingDayModal(id=''){
  const date=document.getElementById('m_nwd_date').value;
  const reason=document.getElementById('m_nwd_reason').value.trim();
  if(!date){ alert('Selecciona una fecha.'); return; }
  db.nonWorkingDays = db.nonWorkingDays || [];
  const payload={id:id||uid('nwd'), date, reason};
  const duplicated=db.nonWorkingDays.some(x=>x.id!==payload.id && x.date===date);
  if(duplicated){ alert('Esa fecha ya está bloqueada.'); return; }
  if(id){
    const idx=db.nonWorkingDays.findIndex(x=>x.id===id);
    if(idx>=0) db.nonWorkingDays[idx]=payload;
  }else{
    db.nonWorkingDays.push(payload);
  }
  save(); closeModal(); render();
}
function deleteNonWorkingDay(id){
  if(confirm('¿Seguro que quieres borrar esta fecha bloqueada?')){
    db.nonWorkingDays=(db.nonWorkingDays||[]).filter(x=>x.id!==id);
    save(); render();
  }
}

function addAbsence(){ openAbsenceModal(); }

async function initializeApp(){
  renderLogo();
  try{
    const session = getStoredSession();
    if(session && session.access_token){
      const profile = await fetchProfile();
      if(profile && ['office','admin'].includes(profile.role)) {
        cacheProfile(profile);
        localStorage.setItem(SESSION_KEY,'ok');
        await loadFromSupabase();
        showApp();
        render();
        return;
      }
    }
  }catch(err){
    console.warn('No se pudo restaurar la sesión', err);
  }
  cacheProfile(null);
  localStorage.removeItem(SESSION_KEY);
  showLogin();
}
initializeApp();
</script>
